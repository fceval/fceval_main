networks:
  network_statsd_zxy:
    external:
      name: statsdserver_network_statsd_zxy
services:
  aflplusplus-0-exid1:
    depends_on:
    - framework-exid1
    - driver-aflplusplus-0-exid1
    environment:
      AFL_NO_AFFINITY: '1'
      AFL_STATSD_FUZZER_BANNER: aflplusplus-0-exid1
      OUTPUT_DIR: /data/aflplusplus-0-exid1
    image: fuzzer-aflplusplus-libxml2
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.12
    volumes:
    - data-vol:/data
    - ./seeds/magma/libxml2:/in
  angora-0-exid1:
    depends_on:
    - framework-exid1
    - driver-angora-0-exid1
    environment:
      AFL_NO_AFFINITY: '1'
      AFL_STATSD_FUZZER_BANNER: angora-0-exid1
      OUTPUT_DIR: /data/angora-0-exid1
    image: fuzzer-angora-libxml2
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.14
    volumes:
    - data-vol:/data
    - ./seeds/magma/libxml2:/in
  driver-aflplusplus-0-exid1:
    depends_on:
    - framework-exid1
    environment:
      ARG: /targets/magma/libxml2/libxml2 @@
      FUZZER_NAME: aflplusplus-0-exid1
      FUZZER_TYPE: aflplusplus
      OUTPUT_DIR: /data/aflplusplus-0-exid1/
      URI_CONTROL: tcp://framework-exid1:3001
      URI_LISTENER: tcp://framework-exid1:3000
      URI_SCHEDULER: tcp://framework-exid1:3002
    image: fuzzer-generic-driver
    links:
    - framework-exid1
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.13
    pid: host
    volumes:
    - data-vol:/data
    - /var/run/docker.sock:/var/run/docker.sock
  driver-angora-0-exid1:
    depends_on:
    - framework-exid1
    environment:
      ARG: /targets/magma/libxml2/libxml2 @@
      FUZZER_NAME: angora-0-exid1
      FUZZER_TYPE: angora
      OUTPUT_DIR: /data/angora-0-exid1/
      URI_CONTROL: tcp://framework-exid1:3001
      URI_LISTENER: tcp://framework-exid1:3000
      URI_SCHEDULER: tcp://framework-exid1:3002
    image: fuzzer-generic-driver
    links:
    - framework-exid1
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.15
    pid: host
    volumes:
    - data-vol:/data
    - /var/run/docker.sock:/var/run/docker.sock
  driver-mopt-0-exid1:
    depends_on:
    - framework-exid1
    environment:
      ARG: /targets/magma/libxml2/libxml2 @@
      FUZZER_NAME: mopt-0-exid1
      FUZZER_TYPE: mopt
      OUTPUT_DIR: /data/mopt-0-exid1/
      URI_CONTROL: tcp://framework-exid1:3001
      URI_LISTENER: tcp://framework-exid1:3000
      URI_SCHEDULER: tcp://framework-exid1:3002
    image: fuzzer-generic-driver
    links:
    - framework-exid1
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.17
    pid: host
    volumes:
    - data-vol:/data
    - /var/run/docker.sock:/var/run/docker.sock
  driver-symcc-0-exid1:
    depends_on:
    - framework-exid1
    environment:
      ARG: /targets/magma/libxml2/libxml2 @@
      FUZZER_NAME: symcc-0-exid1
      FUZZER_TYPE: symcc
      OUTPUT_DIR: /data/symcc-0-exid1/
      URI_CONTROL: tcp://framework-exid1:3001
      URI_LISTENER: tcp://framework-exid1:3000
      URI_SCHEDULER: tcp://framework-exid1:3002
    image: fuzzer-generic-driver
    links:
    - framework-exid1
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.19
    pid: host
    volumes:
    - data-vol:/data
    - /var/run/docker.sock:/var/run/docker.sock
  framework-exid1:
    environment:
      ANALYSIS_BIN_DIR: /work/analysis_binaries/libxml2.analysis_binaries/
      ARG: '@@'
      INPUT_DIR: /in
      OUTPUT_DIR: /data/collab/out
      RUST_LOG: debug
      SCHEDULER: casefc
      URI_CONTROL: tcp://*:3001
      URI_LISTENER: tcp://*:3000
      URI_SCHEDULER: tcp://*:3002
    image: fuzzer-framework-all
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.5
    volumes:
    - data-vol:/data
    - ./seeds/magma/libxml2:/in
  mopt-0-exid1:
    depends_on:
    - framework-exid1
    - driver-mopt-0-exid1
    environment:
      AFL_NO_AFFINITY: '1'
      AFL_STATSD_FUZZER_BANNER: mopt-0-exid1
      OUTPUT_DIR: /data/mopt-0-exid1
    image: fuzzer-mopt-libxml2
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.16
    volumes:
    - data-vol:/data
    - ./seeds/magma/libxml2:/in
  symcc-0-exid1:
    depends_on:
    - framework-exid1
    - driver-symcc-0-exid1
    environment:
      AFL_NO_AFFINITY: '1'
      AFL_STATSD_FUZZER_BANNER: symcc-0-exid1
      OUTPUT_DIR: /data/symcc-0-exid1
    image: fuzzer-symcc-libxml2
    networks:
      network_statsd_zxy:
        ipv4_address: 172.24.61.18
    volumes:
    - data-vol:/data
    - ./seeds/magma/libxml2:/in
version: '2'
volumes:
  data-vol: {}
